# version: '3.8'  # Obsolete in newer Docker Compose versions

services:
  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "5013:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    depends_on:
      - db
    networks:
      - app-network
    volumes:
      - .:/app/src:ro
    env_file:
      - .env

  frontend:
    build:
      context: ../DensityReportingToolFrontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - app-network

  db:
    image: postgres:15
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge