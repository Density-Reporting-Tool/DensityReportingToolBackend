  #     - POSTGRES_USER=${POSTGRES_USER:-postgres}
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
      # - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge