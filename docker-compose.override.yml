services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev   # Use dev Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DOTNET_USE_POLLING_FILE_WATCHER=true
    volumes:
      - .:/app        # Mount source code
      - /app/bin      # Prevent bin from overwriting local
      - /app/obj      # Prevent obj from overwriting local
    entrypoint: ["dotnet", "watch", "run", "--urls", "http://+:8080"]

  frontend:
    build:
      context: ../DensityReportingToolFrontend
      dockerfile: Dockerfile.dev  # development Dockerfile
    ports:
      - "5173:5173"               # Vite dev server
    volumes:
      - ../DensityReportingToolFrontend:/app:cached
      - /app/node_modules
    depends_on:
      - backend
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173", "--open=false"]
